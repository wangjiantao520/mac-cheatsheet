name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build CheatSheet.app
    runs-on: macos-14  # GitHub-hosted runner，自带 Xcode 15.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Build (Release, ad-hoc signed)
        run: ./build.sh

      - name: Verify artifact
        run: |
          test -d build/Build/Products/Release/CheatSheet.app
          file build/Build/Products/Release/CheatSheet.app/Contents/MacOS/CheatSheet

      - name: Zip for upload
        run: |
          cd build/Build/Products/Release
          zip -r CheatSheet.zip CheatSheet.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheatSheet-app
          path: build/Build/Products/Release/CheatSheet.zip
          if-no-files-found: error
          retention-days: 14
