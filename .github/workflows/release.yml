name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-14

    permissions:
      contents: write   # 创建 Release + 上传 asset 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"   # 让后续 step 的 shell 里也能用 $VERSION
          echo "Building version: ${VERSION}"

      - name: Build
        run: ./build.sh

      - name: Zip .app
        run: |
          cd build/Build/Products/Release
          ls -la CheatSheet.app
          zip -r "CheatSheet-${VERSION}.zip" CheatSheet.app
          ls -la "CheatSheet-${VERSION}.zip"

      - name: Verify zip exists
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILE="build/Build/Products/Release/CheatSheet-${VERSION}.zip"
          test -f "$FILE" || { echo "❌ 找不到 $FILE"; exit 1; }
          echo "✅ 找到 $FILE ($(du -h "$FILE" | awk '{print $1}'))"

      - name: Create GitHub Release via gh CLI
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ZIP="build/Build/Products/Release/CheatSheet-${VERSION}.zip"
          
          # 含 - 的 tag 视为 pre-release
          IS_PRERELEASE=""
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="--prerelease"
          fi
          
          gh release create "$VERSION" \
            "$ZIP" \
            --title "$VERSION" \
            --generate-notes \
            $IS_PRERELEASE
          
          echo "✅ Release created: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
